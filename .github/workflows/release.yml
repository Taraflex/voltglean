name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    name: Extract Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build for ${{ matrix.target }}
    needs: metadata
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: pwsh
        run: |
          $bin_name = "voltglean.exe"
          $target = "${{ matrix.target }}"
          $version = "${{ needs.metadata.outputs.version }}"
          $archive_name = "voltglean-$target.zip"
          
          cd target/$target/release
          7z a ../../../$archive_name $bin_name
          cd ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voltglean-${{ matrix.target }}
          path: voltglean-${{ matrix.target }}.zip

  release:
    name: Create Release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          name: Release v${{ needs.metadata.outputs.version }}
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
