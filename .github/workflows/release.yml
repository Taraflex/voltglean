name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  administration: write

jobs:
  metadata:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.final_version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: curr_version
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          echo "version=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION"
          
          DESC=$(sed -n 's/^description = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          KEYWORDS=$(sed -n 's/^keywords = \[\(.*\)\]/\1/p' Cargo.toml | head -n 1 | tr -d '" ' )
          
          if [ ! -z "$DESC" ]; then
            gh repo edit --description "$DESC"
          fi
          
          if [ ! -z "$KEYWORDS" ]; then
            gh repo edit --topic "$KEYWORDS"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version exists on crates.io
        id: check_exists
        run: |
          # Returns 200 if version exists, 404 if not (or if crate doesn't exist)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://crates.io/api/v1/crates/voltglean/$VERSION/download || echo "404")
          if [ "$STATUS" == "200" ]; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Bump version if needed
        if: env.exists == 'true'
        run: |
          echo "Version $VERSION already exists. Bumping patch..."
          # Simple regex to increment the last number in a semver string
          NEW_VERSION=$(echo $VERSION | perl -pe 's/(\d+)(?!.*\d+)/$1 + 1/e')
          sed -i "s/^version = \"$VERSION\"/version = \"$NEW_VERSION\"/" Cargo.toml
          echo "version=$NEW_VERSION" >> $GITHUB_ENV
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Set final version output
        id: final_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    name: Build for ${{ matrix.target }}
    needs: metadata
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # Checkout the branch where workflow was triggered

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: pwsh
        run: |
          $bin_name = "voltglean.exe"
          $target = "${{ matrix.target }}"
          $archive_name = "voltglean-$target.zip"
          
          cd target/$target/release
          7z a -tzip -mx7 -mm=Deflate64 -mfb=64 ../../../$archive_name $bin_name
          cd ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: voltglean-${{ matrix.target }}
          path: voltglean-${{ matrix.target }}.zip

  publish:
    name: Publish to crates.io
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  release:
    name: Create Release
    needs: [metadata, build, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          name: Release v${{ needs.metadata.outputs.version }}
          files: artifacts/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
