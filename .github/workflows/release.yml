name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metadata:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.final_version.outputs.version }}
      name: ${{ steps.final_version.outputs.name }}
      new_sha: ${{ steps.push_step.outputs.sha }}
    steps:
      - name: Checkout Cargo.toml only
        uses: actions/checkout@v4
        with:
          sparse-checkout: Cargo.toml
          sparse-checkout-cone-mode: false
          fetch-depth: 0 # Обязательно 0 для возможности git push
          token: ${{ secrets.ADMIN_TOKEN }}

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Get Metadata and Sync
        id: meta
        run: |
          # Получаем базовые данные
          NAME=$(yq '.package.name' Cargo.toml)
          VERSION=$(yq '.package.version' Cargo.toml)
          DESC=$(yq '.package.description' Cargo.toml)
          KEYWORDS_JSON=$(yq -o=json '.package.keywords' Cargo.toml)

          echo "NAME=$NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          if [ "$DESC" != "null" ] && [ -n "$DESC" ]; then
            gh repo edit --description "$DESC"
          fi

          if [ "$KEYWORDS_JSON" != "null" ] && [ "$KEYWORDS_JSON" != "[]" ]; then
            echo "Updating topics to: $KEYWORDS_JSON"
            echo "{\"names\": $KEYWORDS_JSON}" | gh api -X PUT "repos/{$GITHUB_REPOSITORY}/topics" --input -
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      - name: Check if version exists on crates.io
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://crates.io/api/v1/crates/$NAME/$VERSION/download || echo "404")
          if [ "$STATUS" == "200" ]; then
            echo "exists=true" >> $GITHUB_ENV
          else
            echo "exists=false" >> $GITHUB_ENV
          fi

      - name: Bump version if needed
        if: env.exists == 'true'
        run: |
          echo "Version $VERSION already exists. Bumping patch..."
          NEW_VERSION=$(echo $VERSION | perl -pe 's/(\d+)(?!.*\d+)/$1 + 1/e')
          yq -i ".package.version = \"$NEW_VERSION\"" Cargo.toml
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "bumped=true" >> $GITHUB_ENV

      - name: Push Changes
        id: push_step
        run: |
          if [ "${{ env.bumped }}" == "true" ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml
            git commit -m "chore: bump version to $VERSION [skip ci]"
            git push
            # Извлекаем SHA нового коммита
            echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            # Передаем SHA, который запустил воркфлоу
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Set final outputs
        id: final_version
        run: |
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

  build:
    name: Build for ${{ matrix.target }}
    needs: metadata
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - i686-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - name: Checkout repository at correct SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.new_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: pwsh
        run: |
          $name = "${{ needs.metadata.outputs.name }}"
          $target = "${{ matrix.target }}"
          $archive_name = "$name-$target.zip"

          cd target/$target/release
          # Архивируем все exe и dll. 
          # Если dll нет, 7z может ругнуться, поэтому используем маску аккуратно.
          # В PowerShell 7z сработает корректно, если найден хотя бы один файл по списку.
          7z a -tzip -mx7 -mm=Deflate64 -mfb=64 ../../../$archive_name *.exe *.dll
          cd ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.name }}-${{ matrix.target }}
          path: ${{ needs.metadata.outputs.name }}-${{ matrix.target }}.zip

  publish:
    name: Publish to crates.io
    needs: [metadata, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at correct SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.new_sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  release:
    name: Create Release
    needs: [metadata, build, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          name: Release v${{ needs.metadata.outputs.version }}
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_TOKEN }}
